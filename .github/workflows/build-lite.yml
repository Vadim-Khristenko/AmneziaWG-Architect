name: Build and publish Lite artifact

on:
  push:
    branches: [lite]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build lite
        run: npm run build:lite

      - name: Check dist exists
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::dist directory is missing or empty after build"
            exit 1
          fi

      - name: Archive dist
        run: zip -r "lite-dist-${{ github.sha }}.zip" dist/

      - name: Upload artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: lite-dist-${{ github.sha }}
          path: lite-dist-${{ github.sha }}.zip
          retention-days: 7

      - name: Create lite release and upload asset
        uses: ncipollo/release-action@v1
        with:
          tag: lite-${{ github.sha }}
          name: "Lite build — ${{ github.sha }}"
          body: |
            🔧 Automated Lite build artifact.
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Triggered by: `${{ github.actor }}`

            > Does not replace main releases.
          prerelease: true
          makeLatest: false
          allowUpdates: true
          artifacts: lite-dist-${{ github.sha }}.zip
          artifactContentType: application/zip