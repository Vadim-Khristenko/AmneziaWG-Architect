<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Critical inline CSS: paint the dark canvas and reserve the viewport
             height before Vue mounts. Kills the white flash and the blank→app
             layout shift that was driving CLS to ~1.0 on first paint. -->
        <style>
            html {
                background: #0a0806;
            }
            body {
                margin: 0;
                min-height: 100dvh;
                background: #0a0806;
                color: #e0d4b8;
                font-family:
                    "Manrope Variable", system-ui, -apple-system, sans-serif;
            }
            #app {
                min-height: 100dvh;
            }
        </style>

        <title>AmneziaWG Architect — Генератор конфигураций</title>
        <meta
            name="description"
            content="Профессиональный инструмент для тонкой настройки и генерации конфигураций AmneziaWG. Защита от DPI, управление мусорными пакетами и оптимизация протокола."
        />

        <!-- Favicons -->
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="96x96"
            href="/assets/favicon-96x96.png"
        />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/apple-touch-icon.png"
        />
        <link rel="manifest" href="/assets/site.webmanifest" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta
            property="og:title"
            content="AmneziaWG Architect — Генератор конфигураций"
        />
        <meta
            property="og:description"
            content="Тонкая настройка параметров AmneziaWG: Jc, Jmin, Jmax, S1–S4, H1–H4, CPS I1–I5. Профили мимикрии QUIC/TLS/DTLS/SIP. Защита от блокировок."
        />
        <meta property="og:image" content="/assets/og-image.png" />
        <meta name="apple-mobile-web-app-title" content="AWG-AiT" />

        <!-- Fonts are self-hosted and bundled (see src/main.ts →
             @fontsource-variable/*). No third-party font requests: the UI stays
             fully styled even when fonts.gstatic.com is throttled or blocked. -->
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="src/main.ts"></script>
    </body>
</html>
